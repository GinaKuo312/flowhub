<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<meta name="robots" content="noindex,nofollow"/>
<meta name="theme-color" content="#C9A460"/>
<title>FlowHub — 後台管理系統</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;800;900&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --gold:#C9A460;--gl:#FDF8F0;--gm:#E8D5A8;--gd:#92400E;
  --w:#fff;--bg:#F5F4F0;--dk:#2A1F0E;--mu:#6B6560;--ht:#A09890;
  --gn:#22C55E;--gnbg:#DCFCE7;--gnt:#166534;
  --rd:#DC2626;--rdbg:#FEE2E2;--rdt:#991B1B;
  --bl:#2563EB;--blbg:#DBEAFE;--blt:#1E40AF;
  --pu:#7C3AED;--pubg:#EDE9FE;
  --r:12px;--rs:8px;
}
body{font-family:'Noto Sans TC',system-ui,sans-serif;background:var(--bg);color:var(--dk);min-height:100vh}

/* LOGIN */
#lp{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;background:linear-gradient(135deg,#F5F4F0,#FDF8F0)}
.lcard{background:var(--w);border-radius:20px;box-shadow:0 8px 40px rgba(201,164,96,.18);padding:44px 40px;width:420px;border:1px solid var(--gm)}
.llogo{text-align:center;margin-bottom:8px}
.llogo img{width:80px;height:80px;object-fit:contain}
.llogo-fb{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,#E8C97A,#C9A460);display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:900;color:#fff;margin:0 auto}
.ltitle{text-align:center;font-size:22px;font-weight:900;color:#5C4A2A;margin-bottom:4px}
.lsub{text-align:center;font-size:12px;color:var(--ht);margin-bottom:28px}
.fl{font-size:12px;font-weight:700;color:var(--mu);margin-bottom:5px;margin-top:14px;letter-spacing:.3px}
.fi{width:100%;height:44px;padding:0 14px;border:1.5px solid var(--gm);border-radius:var(--rs);font-size:14px;font-family:inherit;outline:none;background:var(--w);color:var(--dk);transition:border .2s}
.fi:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(201,164,96,.12)}
.lbtn{width:100%;height:46px;background:linear-gradient(135deg,#C9A460,#E8C97A);color:#5C3A00;border:none;border-radius:var(--rs);font-size:15px;font-weight:800;cursor:pointer;margin-top:20px;font-family:inherit;transition:all .2s}
.lbtn:hover{transform:translateY(-1px);box-shadow:0 4px 20px rgba(201,164,96,.4)}
.lerr{color:var(--rd);font-size:12px;text-align:center;margin-top:10px;min-height:18px}

/* APP */
#app{display:none}
.topbar{background:var(--w);border-bottom:1px solid var(--gm);height:54px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:100;box-shadow:0 1px 6px rgba(201,164,96,.08)}
.tlogo{display:flex;align-items:center;gap:9px}
.tlogo img{width:30px;height:30px;object-fit:contain}
.tlogo-fb{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#E8C97A,#C9A460);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;color:#fff}
.tname{font-size:16px;font-weight:800;color:#5C4A2A}
.tright{display:flex;align-items:center;gap:10px}
.tuser{font-size:12px;color:var(--ht)}
.tlout{height:30px;padding:0 12px;border:1.5px solid var(--gm);border-radius:var(--rs);background:var(--w);font-size:12px;font-weight:700;cursor:pointer;color:var(--mu);font-family:inherit;transition:all .2s}
.tlout:hover{background:var(--gl)}

/* LAYOUT */
.layout{display:flex;min-height:calc(100vh - 54px)}
.sidebar{width:195px;background:var(--w);border-right:1px solid var(--gm);padding:10px 0;flex-shrink:0;display:flex;flex-direction:column;overflow-y:auto}
.nb{display:flex;align-items:center;gap:8px;width:100%;padding:9px 15px;border:none;border-left:3px solid transparent;background:none;cursor:pointer;font-size:13px;font-weight:500;color:var(--mu);font-family:inherit;text-align:left;transition:all .15s;white-space:nowrap}
.nb:hover{background:var(--gl);color:var(--dk)}
.nb.on{background:var(--gl);color:var(--gold);border-left-color:var(--gold);font-weight:700}
.nb-sep{height:1px;background:#F0EDE8;margin:6px 0}
.nb-label{font-size:10px;font-weight:700;color:var(--ht);padding:8px 15px 3px;letter-spacing:.8px;text-transform:uppercase}
.nbadge{margin-left:auto;background:var(--gold);color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px;min-width:18px;text-align:center}
.sb-bottom{margin-top:auto;padding:12px;border-top:1px solid #F0EDE8}
.sb-info{background:var(--gl);border:1px solid var(--gm);border-radius:var(--rs);padding:10px 12px}
.sb-info-lbl{font-size:10px;color:var(--gold);font-weight:700;letter-spacing:.8px}
.sb-info-val{font-size:13px;font-weight:700;color:var(--gd);margin-top:2px}
.sb-info-role{font-size:10px;color:var(--ht);margin-top:1px}

/* CONTENT */
.content{flex:1;padding:18px;overflow-y:auto;max-height:calc(100vh - 54px)}
.page-title{font-size:18px;font-weight:900;color:var(--dk);margin-bottom:3px}
.page-sub{font-size:12px;color:var(--ht);margin-bottom:16px}

/* STATS */
.sg{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.sc{background:var(--w);border-radius:var(--r);padding:14px 16px;border:1px solid #E8E4DC;position:relative;overflow:hidden}
.sc::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--gold),#E8C97A)}
.sc-l{font-size:10px;color:var(--ht);letter-spacing:.5px;margin-bottom:5px;font-weight:600;text-transform:uppercase}
.sc-n{font-size:24px;font-weight:900;letter-spacing:-1px}
.sc-s{font-size:11px;color:var(--ht);margin-top:2px}

/* TABLE */
.tw{background:var(--w);border-radius:var(--r);border:1px solid #E8E4DC;overflow:hidden;margin-bottom:12px}
.th{display:flex;align-items:center;justify-content:space-between;padding:11px 16px;border-bottom:1px solid #F0EDE8;flex-wrap:wrap;gap:8px}
.tt{font-size:14px;font-weight:800;color:var(--dk)}
.sr{display:flex;gap:7px;align-items:center;flex-wrap:wrap}
.si{height:34px;padding:0 11px;border:1.5px solid var(--gm);border-radius:var(--rs);font-size:13px;font-family:inherit;outline:none;width:170px}
.si:focus{border-color:var(--gold)}
.ss{height:34px;padding:0 9px;border:1.5px solid var(--gm);border-radius:var(--rs);font-size:13px;font-family:inherit;background:var(--w);cursor:pointer;outline:none}
.rbtn{height:34px;padding:0 12px;background:var(--gl);color:var(--gd);border:1px solid var(--gm);border-radius:var(--rs);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s}
.rbtn:hover{background:var(--gm)}
table{width:100%;border-collapse:collapse}
th{padding:8px 13px;text-align:left;font-size:10px;font-weight:700;color:var(--ht);letter-spacing:.7px;text-transform:uppercase;background:#FAF9F7;border-bottom:1px solid #F0EDE8}
td{padding:10px 13px;font-size:13px;border-top:1px solid #F5F4F2}
tr:hover td{background:#FDFBF7;cursor:pointer}
.nb2{font-weight:700;color:var(--dk)}
.ds{font-size:11px;color:var(--ht);margin-top:1px}
.empty-t{text-align:center;padding:50px;color:var(--ht)}

/* BADGES */
.bdg{display:inline-block;font-size:11px;font-weight:700;padding:3px 8px;border-radius:99px}
.bw{background:#FEF3C7;color:#92400E}
.bc2{background:#EDE9FE;color:#5B21B6}
.brv{background:var(--blbg);color:var(--blt)}
.ba{background:var(--gnbg);color:var(--gnt)}
.bdb{background:#F3E8FF;color:var(--pu)}
.brj{background:var(--rdbg);color:var(--rdt)}
.dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:4px;vertical-align:middle}
.da{background:#22C55E}.db{background:#2563EB}.dc{background:#D97706}.dd{background:#EA580C}.de{background:#DC2626}

/* PANEL */
.ov{position:fixed;inset:0;background:rgba(42,31,14,.22);z-index:40;display:none;backdrop-filter:blur(2px)}
.ov.on{display:block}
.panel{position:fixed;top:0;right:-600px;width:600px;bottom:0;background:var(--w);box-shadow:-10px 0 50px rgba(201,164,96,.15);z-index:50;transition:right .3s ease;overflow-y:auto;display:flex;flex-direction:column}
.panel.on{right:0}
.pt{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid #F0EDE8;position:sticky;top:0;background:var(--w);z-index:1}
.ptitle{font-size:16px;font-weight:800;color:var(--dk)}
.pclose{width:28px;height:28px;border-radius:var(--rs);background:#F5F4F0;border:none;cursor:pointer;font-size:16px;color:var(--mu)}
.pclose:hover{background:var(--gm)}
.pb{padding:16px 20px;flex:1}

/* INFO BLOCKS */
.sec{font-size:10px;font-weight:700;color:var(--ht);letter-spacing:.8px;text-transform:uppercase;margin:14px 0 7px;padding-bottom:4px;border-bottom:1px solid #F0EDE8}
.ig{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.ii{background:#FAF9F7;border-radius:var(--rs);padding:8px 11px;border:1px solid #F0EDE8}
.ii.full{grid-column:1/-1}
.ik{font-size:11px;color:var(--ht);margin-bottom:2px;font-weight:600}
.iv{font-size:13px;font-weight:700;color:var(--dk)}

/* SCORE */
.sh{border-radius:var(--r);padding:13px 16px;margin-bottom:12px;display:flex;align-items:center;gap:14px}
.sc2{width:68px;height:68px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;border:4px solid;flex-shrink:0;font-weight:900}
.snum{font-size:22px;line-height:1}
.sgrp{font-size:11px;font-weight:700;margin-top:1px}
.sdt{flex:1}
.snm{font-size:13px;font-weight:800;margin-bottom:4px}
.sbr{display:flex;align-items:center;gap:7px;margin-bottom:4px;font-size:11px}
.sbl{width:56px;color:var(--mu);font-weight:600}
.sbt{flex:1;height:5px;background:#F0EDE8;border-radius:3px;overflow:hidden}
.sbf{height:100%;border-radius:3px}
.sbv{width:28px;text-align:right;font-weight:700;font-size:11px}
.sadv{border-radius:var(--rs);padding:8px 12px;font-size:12px;font-weight:600;margin-top:6px}

/* PRODUCT TABS */
.ptabs{display:flex;gap:5px;margin-bottom:10px;flex-wrap:wrap}
.ptab{padding:5px 11px;border-radius:var(--rs);font-size:12px;font-weight:700;cursor:pointer;border:1.5px solid var(--gm);background:var(--w);color:var(--mu);font-family:inherit;transition:all .15s}
.ptab:hover{border-color:var(--gold);color:var(--gd)}
.ptab.on{background:var(--gold);border-color:var(--gold);color:#fff}
.pdet{display:none}
.pdet.show{display:block}

/* CONTROLS */
.ssel{width:100%;height:40px;padding:0 12px;border:1.5px solid var(--gm);border-radius:var(--rs);font-size:14px;font-family:inherit;outline:none;cursor:pointer;background:var(--w);margin-bottom:7px}
.ssel:focus{border-color:var(--gold)}
.nta{width:100%;height:85px;padding:8px 12px;border:1.5px solid var(--gm);border-radius:var(--rs);font-size:13px;font-family:inherit;outline:none;resize:none;margin-bottom:7px}
.nta:focus{border-color:var(--gold)}
.svbtn{width:100%;height:40px;background:linear-gradient(135deg,#C9A460,#E8C97A);color:#5C3A00;border:none;border-radius:var(--rs);font-size:14px;font-weight:800;cursor:pointer;font-family:inherit;transition:all .2s}
.svbtn:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(201,164,96,.35)}

/* APPROVE BOX */
.apbox{background:var(--gnbg);border:1.5px solid #A7F3D0;border-radius:var(--r);padding:12px 15px;margin-bottom:8px}
.abt{font-size:13px;font-weight:800;color:#065F46;margin-bottom:9px}
.ag{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:7px}
.al{font-size:11px;font-weight:700;color:#374151;margin-bottom:3px}
.ai{width:100%;padding:7px 10px;border:1.5px solid #A7F3D0;border-radius:var(--rs);font-size:14px;font-family:inherit;outline:none;box-sizing:border-box}
.ai:focus{border-color:#22C55E}

/* COMMISSION BOX（商業模式核心）*/
.cmbox{background:#F3E8FF;border:1.5px solid #C4B5FD;border-radius:var(--r);padding:12px 15px;margin-bottom:8px}
.cmtitle{font-size:13px;font-weight:800;color:var(--pu);margin-bottom:9px}
.cmgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.cml{font-size:11px;font-weight:700;color:#374151;margin-bottom:3px}
.cmi{width:100%;padding:7px 10px;border:1.5px solid #C4B5FD;border-radius:var(--rs);font-size:14px;font-family:inherit;outline:none;box-sizing:border-box}
.cmi:focus{border-color:var(--pu)}

/* CHANNEL SETUP */
.cs-card{background:var(--w);border-radius:var(--r);border:1px solid #E8E4DC;padding:15px 18px;margin-bottom:10px}
.cs-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.cs-name{font-size:14px;font-weight:800}
.cs-code{display:inline-block;font-size:11px;font-weight:700;padding:2px 8px;border-radius:99px;background:var(--blbg);color:var(--blt)}
.cs-stats{display:grid;grid-template-columns:repeat(5,1fr);gap:7px;margin-bottom:8px}
.cs-stat{background:#F9FAFB;border-radius:var(--rs);padding:7px;text-align:center}
.cs-sn{font-size:18px;font-weight:900;color:var(--dk)}
.cs-sl{font-size:10px;color:var(--ht);margin-top:1px}

/* MODAL */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.38);z-index:200;display:none;align-items:center;justify-content:center;padding:20px}
.mo.on{display:flex}
.mc{background:var(--w);border-radius:var(--r);padding:26px;width:500px;max-width:100%;max-height:90vh;overflow-y:auto}
.mt{font-size:17px;font-weight:800;margin-bottom:14px}
.mrow{margin-bottom:11px}
.ml{font-size:12px;font-weight:700;color:var(--mu);margin-bottom:4px}
.mi{width:100%;height:40px;padding:0 12px;border:1.5px solid var(--gm);border-radius:var(--rs);font-size:14px;font-family:inherit;outline:none}
.mi:focus{border-color:var(--gold)}
.mbtns{display:flex;gap:9px;margin-top:18px;justify-content:flex-end}
.mcancel{height:36px;padding:0 16px;border:1.5px solid var(--gm);border-radius:var(--rs);background:var(--w);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
.mok{height:36px;padding:0 16px;background:var(--gold);color:#fff;border:none;border-radius:var(--rs);font-size:13px;font-weight:800;cursor:pointer;font-family:inherit}

/* TOAST */
.tw2{position:fixed;bottom:20px;right:20px;z-index:999;display:flex;flex-direction:column;gap:6px;pointer-events:none}
.tst{background:var(--w);border-left:4px solid var(--gold);border-radius:10px;padding:9px 13px;font-size:13px;font-weight:700;color:var(--gd);box-shadow:0 4px 16px rgba(0,0,0,.12);animation:tsi .3s ease;pointer-events:auto}
@keyframes tsi{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:translateX(0)}}

/* PROGRESS BAR */
.prog-wrap{background:#F0EDE8;border-radius:99px;height:10px;overflow:hidden;margin:8px 0}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--gold),#E8C97A);border-radius:99px;transition:width .8s}

/* GOOGLE LINK */
.gl-link{display:inline-flex;align-items:center;gap:4px;background:var(--blbg);border:1px solid #BFDBFE;color:var(--blt);padding:2px 8px;border-radius:6px;font-size:11px;font-weight:700;text-decoration:none;margin-left:6px;transition:all .15s}
.gl-link:hover{background:#BFDBFE}
.tel-link{display:inline-flex;align-items:center;gap:4px;background:var(--gnbg);border:1px solid #A7F3D0;color:#065F46;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:700;text-decoration:none;margin-left:6px}

@media(max-width:768px){
  .layout{flex-direction:column}
  .sidebar{width:100%;border-right:none;border-bottom:1px solid var(--gm);flex-direction:row;padding:6px;overflow-x:auto;overflow-y:hidden}
  .nb{flex-shrink:0;border-left:none;border-bottom:3px solid transparent;padding:8px 11px}
  .nb.on{border-left:none;border-bottom-color:var(--gold)}
  .nb-sep,.nb-label,.sb-bottom{display:none}
  .content{padding:12px}
  .sg{grid-template-columns:1fr 1fr}
  .panel{width:100%;right:-100%}
  .ig{grid-template-columns:1fr}
  .ag,.cmgrid,.cs-stats{grid-template-columns:1fr 1fr}
}

/* ═══════════════════════════════════════
   RWD 手機版 — 768px 以下
═══════════════════════════════════════ */

/* 漢堡選單按鈕 */
.hamburger{display:none;flex-direction:column;justify-content:center;gap:5px;width:36px;height:36px;background:none;border:none;cursor:pointer;padding:6px}
.hamburger span{display:block;height:2px;background:var(--dk);border-radius:2px;transition:all .25s}
.hamburger.open span:nth-child(1){transform:translateY(7px) rotate(45deg)}
.hamburger.open span:nth-child(2){opacity:0}
.hamburger.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}

/* 手機版遮罩 */
.sb-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.45);z-index:199}
.sb-overlay.show{display:block}

@media(max-width:768px){
  /* Topbar */
  .topbar{padding:0 14px;height:52px}
  .tname{font-size:15px}
  .tuser,.trole{display:none}
  .hamburger{display:flex}

  /* Sidebar 變抽屜 */
  .sidebar{
    position:fixed;top:52px;left:-220px;bottom:0;
    width:220px;z-index:200;
    transition:left .28s cubic-bezier(.4,0,.2,1);
    box-shadow:3px 0 20px rgba(0,0,0,.12);
    overflow-y:auto;
  }
  .sidebar.open{left:0}

  /* Layout */
  .layout{flex-direction:column}
  .content{padding:12px;max-height:none}

  /* Stats 卡片：2欄 */
  .sg{grid-template-columns:repeat(2,1fr);gap:8px}
  .sc-n{font-size:20px}

  /* Table 工具列：wrap */
  .th{flex-direction:column;align-items:stretch;gap:6px;padding:10px 12px}
  .th input,.th select,.th button{width:100%;font-size:13px}
  .qbtn{width:100%}

  /* Table：卡片模式 */
  .tbl thead{display:none}
  .tbl tr{
    display:block;
    background:var(--w);
    border:1px solid #E8E4DC;
    border-radius:var(--rs);
    margin-bottom:10px;
    padding:12px 14px;
    cursor:pointer;
  }
  .tbl tr:hover{background:var(--gl)}
  .tbl td{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:4px 0;
    border:none;
    font-size:13px;
  }
  .tbl td:before{
    content:attr(data-label);
    font-size:11px;
    color:var(--ht);
    font-weight:600;
    white-space:nowrap;
    margin-right:8px;
    flex-shrink:0;
  }
  /* 第一格（姓名）放大 */
  .tbl td:first-child{
    font-size:15px;
    font-weight:700;
    border-bottom:1px solid #F0EDE8;
    padding-bottom:8px;
    margin-bottom:4px;
  }
  .tbl td:first-child:before{display:none}

  /* Panel */
  #panel{
    width:100%!important;
    right:-100%!important;
    bottom:0;top:52px;
    border-radius:0!important;
  }
  #panel.open{right:0!important}

  /* 登入頁 */
  .lcard{width:100%;padding:32px 22px}

  /* 按鈕 */
  .btn-act{min-width:80px;font-size:12px;padding:6px 10px}

  /* 通路設定表格 */
  .tbl-cs thead{display:none}
  .tbl-cs tr{display:block;border:1px solid #E8E4DC;border-radius:var(--rs);margin-bottom:8px;padding:10px 12px}
  .tbl-cs td{display:flex;justify-content:space-between;padding:3px 0;font-size:12px;border:none}
  .tbl-cs td:before{content:attr(data-label);color:var(--ht);font-size:11px;font-weight:600;flex-shrink:0;margin-right:8px}
}

@media(max-width:480px){
  .sg{grid-template-columns:repeat(2,1fr);gap:6px}
  .sc{padding:10px 12px}
  .sc-n{font-size:18px}
  .sc-l{font-size:9px}
}
</style>
</head>
<body>

<!-- ===== 登入頁 ===== -->
<div id="lp">
  <div class="lcard">
    <div class="llogo">
      <img src="logo.png" alt="FlowHub"
           onerror="this.style.display='none';document.getElementById('lfb').style.display='flex'">

window.recordResult = async function(caseId, result, product, note){
  // result: 'approved' | 'rejected'
  // product: 實際送件的商品
  try {
    await fetch(SUPA_URL+'/rest/v1/case_results', {
      method:'POST', headers:H,
      body:JSON.stringify({
        case_id:    caseId,
        result:     result,
        product:    product,
        note:       note||'',
        recorded_at: new Date().toISOString()
      })
    });
    // 達到50筆新結果時觸發權重重算
    await checkAndOptimize();
    toast('✅ 結果已記錄，持續優化評分中');
    window.checkAndOptimize && window.checkAndOptimize();
  } catch(e){ toast('❌ 記錄失敗'); }
};

// 檢查是否需要重算權重
window.checkAndOptimize = async function(){
  try {
    var r = await fetch(SUPA_URL+'/rest/v1/case_results?select=count',{headers:{...H,'Prefer':'count=exact'}});
    var count = parseInt(r.headers.get('Content-Range')?.split('/')[1]||0);
    var lastOpt = localStorage.getItem('fh_last_optimize')||0;
    // 每累積50筆或上次優化超過7天
    var daysSince = (Date.now() - parseInt(lastOpt)) / (1000*60*60*24);
    if(count % 50 === 0 || daysSince >= 7){
      await optimizeWeights();
    }
  } catch(e){}
};

// 自動優化評分權重
window.optimizeWeights = async function(){
  try {
    // 取最近200筆有結果的案件
    var r = await fetch(
      SUPA_URL+'/rest/v1/case_results?select=*,applications(*)&order=recorded_at.desc&limit=200',
      {headers:H}
    );
    var results = await r.json();
    if(!results||results.length < 20) return; // 資料不夠不優化

    // 計算各條件的核准率
    var stats = {
      has_saltr_approved:0, has_saltr_total:0,
      has_proof_approved:0, has_proof_total:0,
      credit_normal_approved:0, credit_normal_total:0,
      tenure_long_approved:0, tenure_long_total:0,
    };

    results.forEach(function(res){
      var c = res.applications;
      if(!c) return;
      var approved = res.result === 'approved';
      if(c.sc_salary_transfer==='有'){
        stats.has_saltr_total++;
        if(approved) stats.has_saltr_approved++;
      }
      if(c.sc_income_proof==='完整'){
        stats.has_proof_total++;
        if(approved) stats.has_proof_approved++;
      }
      if(c.credit_card_status==='正常'){
        stats.credit_normal_total++;
        if(approved) stats.credit_normal_approved++;
      }
      if(parseInt(c.sc_tenure||0)>=24){
        stats.tenure_long_total++;
        if(approved) stats.tenure_long_approved++;
      }
    });

    // 根據實際核准率調整權重（0.5 ~ 1.5 範圍）
    function adjWeight(approved, total, defaultW){
      if(total < 5) return defaultW;
      var rate = approved / total;
      // 核准率高 → 提高權重，核准率低 → 降低權重
      var adj = 0.5 + rate;
      return Math.min(1.5, Math.max(0.5, adj));
    }

    // 更新信貸權重
    SCORE_WEIGHTS.credit.saltr  = adjWeight(stats.has_saltr_approved,   stats.has_saltr_total,   1.0);
    SCORE_WEIGHTS.credit.proof  = adjWeight(stats.has_proof_approved,    stats.has_proof_total,   1.0);
    SCORE_WEIGHTS.credit.cc     = adjWeight(stats.credit_normal_approved, stats.credit_normal_total, 1.0);
    SCORE_WEIGHTS.credit.tenure = adjWeight(stats.tenure_long_approved,   stats.tenure_long_total,  1.0);

    // 儲存新權重
    await fetch(SUPA_URL+'/rest/v1/score_weights', {
      method:'POST', headers:H,
      body:JSON.stringify({
        weights:    JSON.stringify(SCORE_WEIGHTS),
        sample_size: results.length,
        updated_at: new Date().toISOString()
      })
    });

    localStorage.setItem('fh_last_optimize', Date.now().toString());
    console.log('[FlowHub AI] 評分權重已優化，樣本數:', results.length);
  } catch(e){ console.error('優化失敗:', e); }
};

function genSuggestion(c) {
  var inc    = parseInt(c.income)||0;
  var bur    = parseInt(c.loan_burden)||0;
  var dbt    = parseInt(c.debt)||0;
  var dti    = inc>0 ? bur/inc : 1;
  var dbr    = inc>0 ? dbt/inc : 99;
  var cc     = c.credit_card_status||'';
  var isStop = cc==='停卡' || c.is_alert==='yes';

  // 評分快照（使用前台計算的分數）
  var sc = {
    credit:  c.score_credit  || 0,
    vehicle: c.score_vehicle || 0,
    house:   c.score_house   || 0,
    land:    c.score_land    || 0,
    goods:   c.score_goods   || 0,
    debt_c:  c.score_debt_c  || 0
  };

  var products     = [];
  var supplements  = [];
  var risks        = [];

  // ── 建議送件商品（依分數排序）──────────────────────
  if(!isStop){
    if(sc.credit  >= 50) products.push({name:'信貸',          score:sc.credit,  note:'免擔保，審核較嚴'});
    if(sc.vehicle >= 50) products.push({name:'汽機車貸款',     score:sc.vehicle, note:'車輛擔保'});
    if(sc.house   >= 50) products.push({name:'房貸',          score:sc.house,   note:'房屋擔保，利率低'});
    if(sc.land    >= 50) products.push({name:'土地貸款',       score:sc.land,    note:'土地擔保'});
    if(sc.goods   >= 45) products.push({name:'商品消費分期融資', score:sc.goods, note:'門檻較低'});
    if(sc.debt_c  >= 45 || dti>=0.35) products.push({name:'債務整合方案', score:sc.debt_c||50, note:'降低月付壓力'});
    products.sort(function(a,b){return b.score-a.score;});
  }

  // ── 補件建議 ──────────────────────────────────────
  if(c.sc_income_proof !== '完整')
    supplements.push('補充完整收入證明（薪資單 + 在職證明）');
  if(c.sc_salary_transfer !== '有')
    supplements.push('提供薪資轉帳紀錄（近3個月）');
  if(c.sc_phone_owner === '否')
    supplements.push('建議使用本人名下手機號碼');
  if(c.salary_type !== 'transfer' && c.salary_type !== '薪轉')
    supplements.push('若可開立薪轉帳戶，可顯著提升核准率');
  // 融資分期相關建議
  if(c.has_fin === 'yes') {
    if(c.fin_quality === 'late_oft') {
      risks.push('融資分期常常逾期，商品貸和信貸核准率極低');
    }
    if(c.fin_quality === 'stopped') {
      risks.push('⛔ 融資分期已停繳，屬於嚴重違約，所有產品核准率大幅降低');
    }
    if(c.fin_quality === 'late_occ') {
      supplements.push('融資分期有偶爾逾期紀錄，建議說明原因並提供說明書');
    }
    if(c.fin_status === 'settled' && (c.fin_quality==='normal'||c.fin_quality==='settled')) {
      supplements.push('✅ 融資分期已結清且正常繳款，可作為良好信用證明主動提供');
    }
    if(c.fin_status === 'under6') {
      supplements.push('融資分期未滿6期，信用歷史較短，建議等繳滿6期後再申請');
    }
  }

  if(parseInt(c.recent_apply_count||0) >= 2)
    supplements.push('近期查詢次數偏多，建議等待 1-2 個月再送件');
  if(parseInt(c.sc_tenure||0) < 6)
    supplements.push('在職未滿6個月，建議待就業穩定後再申請');
  if(!c.collateral_car && !c.collateral_house && !c.collateral_land && sc.credit < 60)
    supplements.push('若有擔保品（房屋/車輛）可大幅提升核准機率');

  // ── 風險提示 ──────────────────────────────────────
  if(c.is_alert === 'yes')
    risks.push('⛔ 警示戶帳號，所有金融機構均無法送件，須先解除警示');
  if(cc === '停卡')
    risks.push('⛔ 信用卡停卡中，信貸幾乎無法核准，建議先恢復信用');
  if(cc === '遲繳')
    risks.push('信用卡有遲繳紀錄，核准率下降，建議說明原因');
  if(dti >= 0.5)
    risks.push('負債收入比過高（'+Math.round(dti*100)+'%），超過50%核准難度高');
  else if(dti >= 0.35)
    risks.push('負債收入比偏高（'+Math.round(dti*100)+'%），建議降低申請額度或整合負債');
  if(dbr >= 22)
    risks.push('總負債偏高（月收入'+Math.round(dbr)+'倍），建議優先清還部分負債');
  if(parseInt(c.sc_tenure||0) < 3)
    risks.push('在職年資未滿3個月，穩定性嚴重不足，核准率極低');

  var best = c.score_best || 0;
  var g    = window.gi(best);

  return {products, supplements, risks, grade:g.g, label:g.l, best};
}

window.calcScore = function(c){
  if(c.is_alert==='yes') return 0;
  if(c.credit_card_status==='停卡') return 0;
  // 使用前台送出的評分快照（最精準）
  if(c.score_best && c.score_best > 0) return c.score_best;
  // 若無快照則即時計算
  var inc=parseInt(c.income)||0, amt=parseInt(c.need_amount)||0;
  var bur=parseInt(c.loan_burden)||0;
  var ratio=inc>0?(bur+Math.round(amt/24))/inc:1;
  var ten=parseInt(c.sc_tenure)||0;
  var cc=c.credit_card_status||'';
  var age=30;
  if(c.birth_date&&c.birth_date.length>=4) age=new Date().getFullYear()-parseInt(c.birth_date.substring(0,4));
  var s=50;
  s+=cc==='正常'?18:cc==='最低'?-12:cc==='遲繳'?-25:-5;
  s+=ten>=24?18:ten>=12?12:ten>=6?5:ten>=3?0:-18;
  var j=c.sc_job_type||''; s+=j==='正職'?12:j==='自營'?6:j==='兼職'?0:-12;
  s+=ratio<.3?18:ratio<.4?8:-25;
  var pf=c.sc_income_proof||''; s+=pf==='完整'?10:pf==='部分'?3:-20;
  if(c.sc_salary_transfer==='有') s+=15;
  var q=parseInt(c.recent_apply_count)||0; s+=q>=3?-25:q===2?-10:q===1?0:5;
  s+=age>=25&&age<=55?5:age>=20?0:-40;
  s+=c.sc_phone_owner==='是'?5:-10;
  var st=c.salary_type||''; s+=st==='transfer'?5:st==='non-transfer'?2:-3;
  return Math.min(100,Math.max(0,s));
}

window.gi = function(s){
  if(s>=82) return{g:'A',l:'穩定可承作',bg:'#DCFCE7',bc:'#22C55E',tc:'#166534',r:92,dc:'da'};
  if(s>=68) return{g:'B',l:'確認收入後送件',bg:'#DBEAFE',bc:'#2563EB',tc:'#1D4ED8',r:75,dc:'db'};
  if(s>=55) return{g:'C',l:'降額/補件後評估',bg:'#FEF3C7',bc:'#D97706',tc:'#92400E',r:50,dc:'dc'};
  if(s>=40) return{g:'D',l:'高風險先補強',bg:'#FFEDD5',bc:'#EA580C',tc:'#9A3412',r:25,dc:'dd'};
  return{g:'E',l:'不建議送件',bg:'#FEE2E2',bc:'#DC2626',tc:'#991B1B',r:5,dc:'de'};
}

window.renderPerf = function() {
  var el = $('perf_content');
  if(!el) return;

  // 依通路分組統計
  var chMap = {};
  cases.forEach(function(c) {
    var ch = c.channel || '未知';
    if(!chMap[ch]) chMap[ch] = {
      total:0, approved:0, rejected:0, pending:0,
      totalAmt:0, approvedAmt:0,
      scores:[], feedbacks:[]
    };
    var d = chMap[ch];
    d.total++;
    d.scores.push(calcScore(c));
    var st = c.status||'';
    if(st==='已核准'||st==='已撥款'){ d.approved++; d.approvedAmt+=(parseInt(c.approved_amount)||0); }
    if(st==='不予承作') d.rejected++;
    if(st==='審核中') d.pending++;
    d.totalAmt += (parseInt(c.need_amount)||0);
    if(c.result_feedback) d.feedbacks.push(c.result_feedback);
  });

  // 排序：核准數最多的通路在前
  var sorted = Object.keys(chMap).sort(function(a,b){
    return chMap[b].approved - chMap[a].approved;
  });

  if(!sorted.length) { el.innerHTML='<div class="empty-t">尚無資料</div>'; return; }

  var html = '<div style="display:grid;gap:12px">';

  sorted.forEach(function(chCode) {
    var d = chMap[chCode];
    var approveRate = d.total > 0 ? Math.round(d.approved/d.total*100) : 0;
    var avgScore    = d.scores.length > 0 ? Math.round(d.scores.reduce(function(a,b){return a+b;},0)/d.scores.length) : 0;
    var realApprove = d.feedbacks.filter(function(f){return f==='approved';}).length;
    var realTotal   = d.feedbacks.filter(function(f){return f!=='pending';}).length;
    var realRate    = realTotal > 0 ? Math.round(realApprove/realTotal*100) : null;

    // 評分等級
    var g = gi(avgScore);

    html += '<div style="background:#fff;border:1px solid var(--gm);border-radius:var(--rs);padding:16px">';
    html += '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">';
    html += '<div style="font-size:14px;font-weight:700">'+chCode+'</div>';
    html += '<span style="font-size:11px;padding:2px 10px;border-radius:99px;background:'+g.bg+';color:'+g.tc+'">平均 '+g.g+' 級（'+avgScore+'分）</span>';
    html += '</div>';

    // 統計格
    html += '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:10px">';
    html += stat3('總案件', d.total, '#F5F4F0', '#5C4A2A');
    html += stat3('核准', d.approved, '#DCFCE7', '#166534');
    html += stat3('核准率', approveRate+'%', '#DBEAFE', '#1D4ED8');
    html += stat3('核准金額', d.approvedAmt>0?'$'+Math.round(d.approvedAmt/10000)+'萬':'—', '#FEF3C7', '#92400E');
    html += '</div>';

    // 實際送件結果（如果有回饋資料）
    if(realTotal > 0) {
      html += '<div style="font-size:11px;color:var(--mu)">';
      html += '📊 實際送件結果（'+realTotal+'筆）：';
      html += '核准 <strong style="color:#166534">'+realApprove+'筆</strong>';
      html += '，核准率 <strong style="color:#2563EB">'+realRate+'%</strong>';
      html += '</div>';
    }

    // 進度條
    html += '<div style="margin-top:10px">';
    html += '<div style="display:flex;justify-content:space-between;font-size:10px;color:var(--ht);margin-bottom:3px">';
    html += '<span>送件轉換率</span><span>'+approveRate+'%</span></div>';
    html += '<div style="height:6px;background:#F0ECE4;border-radius:99px;overflow:hidden">';
    html += '<div style="height:100%;width:'+approveRate+'%;background:linear-gradient(90deg,#C9A460,#22C55E);border-radius:99px;transition:.5s"></div>';
    html += '</div></div>';

    html += '</div>';
  });

  html += '</div>';
  el.innerHTML = html;
};

function stat3(label, val, bg, tc) {
  return '<div style="background:'+bg+';border-radius:6px;padding:8px;text-align:center">'+
    '<div style="font-size:16px;font-weight:800;color:'+tc+'">'+val+'</div>'+
    '<div style="font-size:10px;color:'+tc+';opacity:.7;margin-top:2px">'+label+'</div>'+
    '</div>';
}

window.renderStats2 = function(){
  if(!$('pg_stats')||$('pg_stats').style.display==='none') return;
  // 圓餅圖（Canvas）
  var approve=cases.filter(function(c){ return c.status==='已核准'||c.status==='已撥款'; }).length;
  var total=cases.length;
  var cv=$('donut');
  if(cv){
    var ctx=cv.getContext('2d');
    var r=52, cx=60, cy=60;
    ctx.clearRect(0,0,120,120);
    var pct=total>0?approve/total:0;
    // 背景圓
    ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2);
    ctx.fillStyle='#F0EDE8'; ctx.fill();
    // 填充弧
    if(pct>0){
      ctx.beginPath(); ctx.moveTo(cx,cy);
      ctx.arc(cx,cy,r,-Math.PI/2,-Math.PI/2+Math.PI*2*pct);
      ctx.fillStyle='#C9A460'; ctx.fill();
    }
    // 中空
    ctx.beginPath(); ctx.arc(cx,cy,34,0,Math.PI*2);
    ctx.fillStyle='#fff'; ctx.fill();
    // 數字
    ctx.fillStyle='#2A1F0E'; ctx.font='bold 16px Noto Sans TC';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(Math.round(pct*100)+'%',cx,cy);
    $('donut_lbl').textContent='核准率（'+approve+'/'+total+'）';
  }
  // 評等分布
  var gc={A:0,B:0,C:0,D:0,E:0};
  cases.forEach(function(c){ var g=gi(calcScore(c)).g; gc[g]=(gc[g]||0)+1; });
  var gcol={A:'#22C55E',B:'#2563EB',C:'#D97706',D:'#EA580C',E:'#DC2626'};
  var gd=$('grade_dist');
  if(gd){
    gd.innerHTML=['A','B','C','D','E'].map(function(g){
      var pct=total>0?Math.round(gc[g]/total*100):0;

        '<div style="width:16px;font-size:13px;font-weight:700;color:'+gcol[g]+'">'+g+'</div>'+
        '<div class="prog-wrap" style="flex:1;margin:0"><div class="prog-fill" style="width:'+pct+'%;background:'+gcol[g]+'"></div></div>'+
        '<div style="width:60px;font-size:12px;text-align:right;color:'+gcol[g]+';font-weight:700">'+gc[g]+' 件（'+pct+'%）</div>'+
      '</div>';
    }).join('');
  }
  // 通路排名
  if(ROLE==='admin'){
    var chMap={};
    cases.forEach(function(c){ var ch=c.channel||'direct'; if(!chMap[ch]) chMap[ch]={n:0,ap:0,amt:0}; chMap[ch].n++; if(c.status==='已核准'||c.status==='已撥款'){ chMap[ch].ap++; chMap[ch].amt+=(parseInt(c.approved_amount)||0); } });
    var ranked=Object.keys(chMap).sort(function(a,b){ return chMap[b].ap-chMap[a].ap; }).slice(0,8);
    var cr=$('ch_rank');
    if(cr) cr.innerHTML=ranked.map(function(code,i){
      var d=chMap[code]; var ch=CHANNELS[code];
      var name=ch?ch.name:code;
      var medal=i===0?'🥇':i===1?'🥈':i===2?'🥉':'#'+(i+1);
      return '<div style="display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid #F5F4F2">'+
        '<div style="width:26px;font-size:13px;font-weight:800;color:var(--gold)">'+medal+'</div>'+
        '<div style="flex:1;font-size:13px;font-weight:700">'+name+'</div>'+
        '<div style="font-size:12px;color:var(--mu)">送件 <strong>'+d.n+'</strong> 件 · 核准 <strong style="color:#22C55E">'+d.ap+'</strong> 件</div>'+
        '<div style="font-size:12px;font-weight:700;color:#7C3AED">'+(d.amt>0?'NT$'+Math.round(d.amt/10000)+'萬':'—')+'</div>'+
      '</div>';
    }).join('');
    // 月目標
    var mt=$('month_target');
    if(mt){
      var now=new Date();
      var thisMonth=cases.filter(function(c){ var d=new Date(c.created_at); return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear(); });
      var mApprove=thisMonth.filter(function(c){ return c.status==='已核准'||c.status==='已撥款'; });
      var mAmt=mApprove.reduce(function(s,c){ return s+(parseInt(c.approved_amount)||0); },0);
      mt.innerHTML='<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:10px">'+

window.renderCommission = function(){
  if(!$('pg_commission')||$('pg_commission').style.display==='none') return;
  var approved=cases.filter(function(c){ return (c.status==='已核准'||c.status==='已撥款')&&c.approved_amount>0; });
  var totalCm=approved.reduce(function(s,c){ return s+(parseInt(c.channel_commission)||0); },0);
  var unpaid=approved.filter(function(c){ return !c.commission_paid; });
  var unpaidCm=unpaid.reduce(function(s,c){ return s+(parseInt(c.channel_commission)||0); },0);
  $('cm_stats').innerHTML=[
    ['核准案件數',approved.length,'',''],
    ['待結算案件',unpaid.length,'color:#D97706',''],
    ['待結算佣金',unpaid.length>0?'NT$'+unpaidCm.toLocaleString():0,'color:var(--pu)',''],
    ['已結算佣金','NT$'+(totalCm-unpaidCm).toLocaleString(),'color:#22C55E',''],
  ].map(function(r){
    return '<div class="sc"><div class="sc-l">'+r[0]+'</div><div class="sc-n" style="'+r[2]+'">'+r[1]+'</div></div>';
  }).join('');
  var el=$('cm_tbody');
  if(!el) return;
  if(!unpaid.length){ el.innerHTML='<div class="empty-t">所有核准案件佣金均已結算</div>'; return; }
  el.innerHTML='<table><thead><tr>'+
    '<th>申請人</th><th>公司</th><th>通路</th><th>核准金額</th><th>佣金率</th><th>佣金</th><th>操作</th>'+
  '</tr></thead><tbody>'+
  unpaid.map(function(c){
    var cm=parseInt(c.channel_commission)||Math.round((parseInt(c.approved_amount)||0)*(parseFloat(c.commission_rate)||3)/100);
    return '<tr>'+
      '<td><div class="nb2">'+(c.name||'—')+'</div><div class="ds">'+(c.phone||'—')+'</div></td>'+
      '<td>'+(c.company||'—')+'</td>'+
      '<td>'+(CHANNELS[c.channel]?CHANNELS[c.channel].name:c.channel||'—')+'</td>'+
      '<td style="font-weight:700;color:#22C55E">'+(c.approved_amount?'NT$'+parseInt(c.approved_amount).toLocaleString():'—')+'</td>'+
      '<td>'+(c.commission_rate||3)+'%</td>'+
      '<td style="font-weight:700;color:var(--pu)">NT$'+cm.toLocaleString()+'</td>'+
      '<td><button onclick="markPaid(\''+c.id+'\','+cm+')" style="padding:4px 10px;border:none;border-radius:6px;background:var(--gnbg);color:var(--gnt);font-size:12px;font-weight:700;cursor:pointer">✅ 已結算</button></td>'+
    '</tr>';
  }).join('')+'</tbody></table>';
}

window.markPaid = async function(caseId, cmAmt){
  await fetch(SUPA_URL+'/rest/v1/applications?id=eq.'+caseId,{
    method:'PATCH',headers:Object.assign({},H,{'Prefer':'return=minimal'}),
    body:JSON.stringify({commission_paid:true,commission_paid_at:new Date().toISOString(),channel_commission:cmAmt})
  });
  var c=cases.find(function(x){ return x.id===caseId; });
  if(c){ c.commission_paid=true; c.channel_commission=cmAmt; }
  renderCommission();
  toast('✅ 佣金已標記為結算','ok');
}

window.fmtDate = function(ts){
  if(!ts) return '—';
  var d=new Date(ts);
  return (d.getMonth()+1)+'/'+(d.getDate())+' '+(String(d.getHours()).padStart(2,'0'))+':'+(String(d.getMinutes()).padStart(2,'0'));
}
window.bc = function(s){
  return s==='已核准'?'ba':s==='已撥款'?'bdb':s==='已聯繫'?'bc2':s==='審核中'?'brv':s==='不予承作'?'brj':'bw';
}

window.filterCases = function(){
  var q=($('qs').value||'').toLowerCase();
  var st=$('qst').value;
  var ch=$('qch').value;
  var gr=$('qgr').value;
  var data=cases.filter(function(c){
    var mq=!q||(c.name||'').toLowerCase().includes(q)||(c.phone||'').includes(q)||(c.company||'').toLowerCase().includes(q);
    var ms=!st||(c.status||'待處理')===st;
    var mc=!ch||(c.channel||'direct')===ch;
    var mg=!gr||gi(calcScore(c)).g===gr;
    return mq&&ms&&mc&&mg;
  });
  renderCasesTable(data);
}

window.calcCm = function(){
  var amt=parseFloat($('ps_amt').value)||0;
  var rate=parseFloat($('ps_cmr').value)||3;
  var cm=Math.round(amt*rate/100);
  var cmEl=$('ps_cm'); var pv=$('cm_preview');
  if(cmEl) cmEl.value=cm;
  if(pv) pv.textContent=cm>0?'NT$'+cm.toLocaleString()+' 佣金（'+rate+'% × NT$'+amt.toLocaleString()+'）':'';

window.saveCase = async function(caseId){
  var status=$('ps_st').value;
  var body={
    status: status,
    notes: $('ps_notes').value,
    // CRM 備註
    crm_note: $('ps_crm').value.trim()||null,
    next_follow_up: $('ps_follow').value||null,
    // 結果回饋（核准結果用於評分優化）
    result_feedback: $('ps_result') ? $('ps_result').value : null,
    result_bank: $('ps_rbank') ? $('ps_rbank').value.trim()||null : null,
    result_rate: $('ps_rrate') ? parseFloat($('ps_rrate').value)||null : null,
    feedback_at: new Date().toISOString()
  };
  if(status==='已核准'||status==='已撥款'){
    var amt=parseInt($('ps_amt').value)||null;
    var rate=parseFloat($('ps_cmr').value)||3;
    Object.assign(body,{
      approved_amount: amt,
      fee_amount: parseInt($('ps_fee').value)||null,
      disbursed_amount: parseInt($('ps_dis').value)||null,
      disburse_date: $('ps_date').value||null,
      bank_name: $('ps_bank').value||null,
      loan_no: $('ps_loan').value||null,
      commission_rate: rate,
      channel_commission: parseInt($('ps_cm').value)||Math.round(amt*rate/100)
    });
  }
  try{
    var r=await fetch(SUPA_URL+'/rest/v1/applications?id=eq.'+caseId,{
      method:'PATCH',
      headers:Object.assign({},H,{'Prefer':'return=minimal'}),
      body:JSON.stringify(body)
    });
    if(r.ok){
      var c=cases.find(function(x){ return x.id===caseId; });
      if(c) Object.assign(c,body);
      $('ps_msg').textContent='✅ 儲存成功 '+new Date().toLocaleTimeString('zh-TW');
      setTimeout(function(){ if($('ps_msg')) $('ps_msg').textContent=''; },4000);
      renderStatsCards(); filterCases();
      if($('pg_approved').style.display!=='none') renderApproved();
      toast('✅ 案件狀態已更新','ok');
    }
  }catch(e){ toast('❌ 儲存失敗','err'); }
}

window.csvDownload = function(data,name){
  var hd=['姓名','手機','出生日期','戶籍地址','公司','公司電話','申請金額','核准金額','手續費','佣金','佣金率','通路','狀態','評分','評等','送件銀行','貸款案號','申請時間'];
  var rows=data.map(function(c){
    return [c.name,c.phone,c.company,c.need_amount,c.approved_amount,c.fee_amount,c.channel_commission,(c.commission_rate||'')+'%',CHANNELS[c.channel]?CHANNELS[c.channel].name:c.channel,c.status,calcScore(c),gi(calcScore(c)).g,c.created_at?new Date(c.created_at).toLocaleString('zh-TW'):''
    ].map(function(v){ return '"'+(v||'').toString().replace(/"/g,'""')+'"'; }).join(',');
  });
  var csv='\uFEFF'+hd.join(',')+'\n'+rows.join('\n');
  var a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download=name+'_'+new Date().toLocaleDateString('zh-TW').replace(/\//g,'-')+'.csv';
  a.click();
  toast('✅ 匯出完成','ok');
}

window.doRecord = async function(caseId, result){

async function upgradePlan(code){
  var plans=['basic','advanced','flagship','enterprise'];
  var planNames={basic:'基本版 $1,490',advanced:'進階版 $3,490',flagship:'旗艦版 $8,900',enterprise:'企業版 $18,000'};
  var newPlan=prompt('選擇新方案（輸入1-4）：\n1. basic 基本版 $1,490\n2. advanced 進階版 $3,490\n3. flagship 旗艦版 $8,900\n4. enterprise 企業版 $18,000');
  if(!newPlan) return;
  var planKey=plans[parseInt(newPlan)-1];
  if(!planKey){ alert('輸入錯誤'); return; }
  try{
    var r=await fetch(SUPA_URL+'/rest/v1/channels?code=eq.'+code,{
      method:'PATCH',headers:Object.assign({},H,{'Prefer':'return=minimal'}),
      body:JSON.stringify({plan:planKey,is_trial:false,trial_expires_at:null})
    });
    if(r.ok){ alert('✅ 已升級為 '+planNames[planKey]); window.loadChannels(); }
    else { alert('❌ 升級失敗'); }
  }catch(e){ alert('錯誤：'+e.message); }
}

async function submitAddChannel(){
  var err = document.getElementById('ac_err');
  err.style.display='none';

  var type  = document.getElementById('ac_type').value;
  var name  = document.getElementById('ac_name').value.trim();
  var phone = document.getElementById('ac_phone').value.trim();
  var pw    = (document.getElementById('ac_pw')?document.getElementById('ac_pw').value:'')||phone;
  var plan  = document.getElementById('ac_plan').value;
  var trial = parseInt(document.getElementById('ac_trial').value)||14;

  if(!name){ err.textContent='請填寫姓名或公司名稱'; err.style.display='block'; return; }
  if(!phone){ err.textContent='請填寫帳號'; err.style.display='block'; return; }

  var trialExp = trial > 0 ? new Date(Date.now() + trial*24*60*60*1000).toISOString() : null;

  var payload = {
    biz_id: phone, code: phone,
    name: name, contact_name: name, phone_number: phone,
    password: pw, password_hash: pw,
    plan: plan||'basic', apply_type: type||'personal',
    status: 'active', is_trial: trial>0,
    trial_expires_at: trialExp, crm_note: ''
  };

  try {
    var r = await fetch(SUPA_URL+'/rest/v1/channels', {
      method: 'POST',
      headers: {
        'apikey': SUPA_KEY, 'Authorization': 'Bearer '+SUPA_KEY,
        'Content-Type': 'application/json', 'Prefer': 'return=representation'
      },
      body: JSON.stringify(payload)
    });
    var d = await r.json();

    if(r.ok || r.status===201){
      document.getElementById('add_channel_modal').remove();
      if(typeof window.loadChannels === 'function') window.loadChannels();
      var planName = plan==='advanced'?'進階版':plan==='flagship'?'旗艦版':'基本版';
      alert('帳號建立成功！' + '\n帳號：'+phone + '\n密碼：'+pw + '\n方案：'+planName + (trial>0?'\n試用：'+trial+'天':''));
    } else {
      var errMsg = '建立失敗';
      if(d && d.code==='23505') errMsg = '此帳號已存在（'+phone+'），請換一個號碼';
      else if(d && d.code==='23502') errMsg = '缺少必填欄位：'+(d.details||d.message||'');
      else if(d && d.message) errMsg = d.message;
      else errMsg = '建立失敗 HTTP '+r.status;
      err.textContent = '❌ ' + errMsg;
      err.style.display='block';
    }
  } catch(e){
    err.textContent = '❌ 網路錯誤：'+e.message;
    err.style.display='block';
  }
}

};
window.closeSidebar = function(){
  var sb = document.querySelector('.sidebar');
  var hb = document.getElementById('hamburger');
  var ov = document.getElementById('sb_overlay');
  if(sb) sb.classList.remove('open');
  if(hb) hb.classList.remove('open');
  if(ov) ov.classList.remove('show');
};
// 點 nav 項目後自動關閉 sidebar（手機版）
document.addEventListener('click', function(e){
  if(e.target.classList.contains('nb') && window.innerWidth <= 768){
    window.closeSidebar();
  }
});
</script>
</body>
</html>
